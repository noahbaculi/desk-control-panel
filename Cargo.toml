[package]
edition = "2021"
name = "desk-control-panel"
version = "0.1.0"

[lib]
test = false

[[test]]
name = "example_test"
harness = false

[[bin]]
name = "control_panel"
path = "src/bin/control_panel.rs"
test = false

[[bin]]
name = "meeting_sign"
path = "src/bin/meeting_sign.rs"
test = false

[dependencies]
defmt = "1.0.1"
esp-bootloader-esp-idf = "0.1.0"
esp-hal = { version = "=1.0.0-beta.1", features = [
  "defmt",
  "esp32c3",
  "unstable",
] }
critical-section = "1.2.0"
embassy-executor = { version = "0.7.0", features = [
  "defmt",
  "task-arena-size-20480",
] }
embassy-time = { version = "0.4.0", features = ["defmt"] }
esp-alloc = { version = "0.8.0", features = ["defmt"] }
esp-hal-embassy = { version = "0.8.1", features = ["defmt", "esp32c3"] }
static_cell = { version = "2.1.0", features = ["nightly"] }
embassy-sync = { version = "0.7.0", features = ["defmt"] }
embedded-io-async = { version = "0.6.1", features = ["defmt-03"] }
postcard = { version = "1.1.1", features = ["use-defmt"] }
serde = { version = "1.0.219", default-features = false, features = ["derive"] }
cobs = { version = "0.3.0", default-features = false, features = ["defmt"] }
panic-rtt-target = { version = "0.2.0", features = ["defmt"] }
rtt-target = { version = "0.6.1", features = ["defmt"] }
esp-println = { version = "0.14.0", features = [
  "esp32c3",
  "defmt-espflash",
  "log-04",
] }
log = "0.4.27"
esp-backtrace = { version = "0.16.0", features = [
  "esp32c3",
  "panic-handler",
  "defmt",
] }
# defmt-rtt = "1.0.0"
defmt-rtt = "0.4"

[dev-dependencies]
embedded-test = { version = "0.6.0", features = [
  "defmt",
  "embassy",
  "external-executor",
] }


[profile.dev]
# Rust debug is too slow.
# For debug builds always builds with some optimization
opt-level = "s"

[profile.release]
codegen-units = 1        # LLVM can perform better optimizations using a single thread
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 's'
overflow-checks = false
